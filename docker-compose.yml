services:
  app:
    build: .
    ports:
      - "4567:4567"
    volumes:
      - .:/app
    environment:
      - ADK_LOG_LEVEL=${ADK_LOG_LEVEL:-debug}
      - REDIS_URL=redis://redis:6379/0
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - WEBHOOK_RECEIVER_SECRET=${WEBHOOK_RECEIVER_SECRET}
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
