name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Ruby ${{ matrix.ruby }} Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.4']

    env:
      RAILS_ENV: test
      COVERAGE: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Run RSpec tests
        run: bundle exec rspec --format progress --format RspecJunitFormatter --out tmp/rspec-results.xml
        continue-on-error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rspec-results-ruby-${{ matrix.ruby }}
          path: tmp/rspec-results.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.ruby == '3.4'
        with:
          name: coverage-report
          path: coverage/

  lint:
    name: RuboCop Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Run RuboCop
        # The repo is RuboCop-clean (remaining debt is tracked in
        # .rubocop_todo.yml), so fail on ANY offense to keep it that way.
        run: bundle exec rubocop --format progress --format json --out tmp/rubocop-results.json

      - name: Upload linting results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rubocop-results
          path: tmp/rubocop-results.json

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Run bundle-audit
        run: gem install bundler-audit && bundle-audit check --update

  build:
    name: Build Gem
    runs-on: ubuntu-latest
    needs: [test, lint, security]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Build gem
        run: gem build legate.gemspec

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: gem
          path: "*.gem"
